<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>THE FLORIDA SIGNAL | Development Intelligence</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    /* ── LIGHT THEME — bright, clean, premium ── */
    --bg-deep: #eef2f7;
    --bg-dark: #f8fafc;
    --bg-panel: #ffffff;
    --bg-card: #ffffff;
    --bg-hover: #f1f5f9;
    --bg-soft: #f5f7fa;
    /* ── Borders on light ── */
    --border-subtle: rgba(15, 23, 42, 0.06);
    --border-medium: rgba(15, 23, 42, 0.10);
    --border-strong: rgba(15, 23, 42, 0.14);
    --border-focus: rgba(34, 193, 214, 0.55);
    /* ── Deep navy / slate text ── */
    --text-primary: #0f172a;
    --text-secondary: #334155;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    /* ── Accent (unchanged) ── */
    --accent: #22c1d6;
    --accent-dark: #0ea5b8;
    --accent-soft: rgba(34, 193, 214, 0.10);
    --accent-glow: rgba(34, 193, 214, 0.25);
    /* ── Category colors (bright & saturated) ── */
    --c-assemblage: #8b5cf6;
    --c-entitlement: #f59e0b;
    --c-execution: #10b981;
    --c-reinvestment: #3b82f6;
    --c-alert: #ef4444;
    --brand-blue: #0284c7;
    /* ── Shadows ── */
    --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.06);
    --shadow-md: 0 2px 6px rgba(15, 23, 42, 0.06), 0 4px 12px rgba(15, 23, 42, 0.08);
    --shadow-lg: 0 6px 16px rgba(15, 23, 42, 0.08), 0 12px 32px rgba(15, 23, 42, 0.10);
    --shadow-xl: 0 12px 28px rgba(15, 23, 42, 0.10), 0 24px 48px rgba(15, 23, 42, 0.14);
    /* ── Radii ── */
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
  body, html { height: 100%; width: 100%; overflow: hidden; background: var(--bg-deep); color: var(--text-primary); position: fixed; -webkit-font-smoothing: antialiased; }
  /* ── LAYOUT ── */
  .layout { display: flex; height: 100%; width: 100%; position: relative; }
  /* ── SIDEBAR ── */
  .mobile-handle { display: none; }
  .sidebar {
    width: 380px; background: var(--bg-dark);
    border-right: 1px solid var(--border-subtle);
    display: flex; flex-direction: column; z-index: 1000;
    box-shadow: 1px 0 0 rgba(15,23,42,0.02), 4px 0 24px rgba(15,23,42,0.04);
  }
  /* ── HEADER ── */
  .header {
    padding: 18px 20px 16px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border-subtle);
    flex-shrink: 0;
  }
  .sub-logo {
    font-size: 10px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px;
    display: flex; align-items: center; gap: 8px;
  }
  .sub-logo::before {
    content: ''; display: inline-block; width: 5px; height: 5px;
    background: var(--accent); border-radius: 50%;
    box-shadow: 0 0 8px rgba(34,193,214,0.55);
  }
  /* ── STATS ── */
  .stats-main {
    margin-top: 16px; padding: 0;
    background: none; border: none; border-radius: 0;
    display: flex; gap: 16px; align-items: baseline;
  }
  .stat-block { flex: none; }
  .stat-block + .stat-block { border-left: 1px solid var(--border-subtle); padding-left: 16px; }
  .stat-val-main {
    font-size: 22px; font-weight: 800; color: var(--text-primary);
    letter-spacing: -0.5px; line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .stat-lbl-main {
    font-size: 9px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1px; margin-top: 5px;
  }
  /* ── SCROLL AREA ── */
  .sidebar-scroll {
    flex: 1; overflow-y: auto; display: flex; flex-direction: column;
    -webkit-overflow-scrolling: touch;
    background: var(--bg-dark);
  }
  .sidebar-scroll::-webkit-scrollbar { width: 6px; }
  .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
  .sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(15,23,42,0.12); border-radius: 3px; }
  .sidebar-scroll::-webkit-scrollbar-thumb:hover { background: rgba(15,23,42,0.22); }
  /* ── FILTERS ── */
  .filters {
    padding: 16px 20px 14px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border-subtle);
    flex-shrink: 0;
  }
  .search-box {
    width: 100%;
    background: var(--bg-soft);
    border: 1px solid var(--border-medium);
    color: var(--text-primary); padding: 10px 12px;
    border-radius: var(--radius-sm); font-size: 12px; font-weight: 500;
    outline: none; margin-bottom: 14px;
    transition: all 0.2s ease;
  }
  .search-box:focus {
    border-color: var(--border-focus);
    background: #ffffff;
    box-shadow: 0 0 0 3px rgba(34, 193, 214, 0.12);
  }
  .search-box::placeholder { color: var(--text-dim); font-weight: 400; }
  .filter-lbl {
    font-size: 9px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1.2px;
    margin-bottom: 8px; display: block;
  }
  .cat-filters { display: flex; flex-direction: column; gap: 3px; margin-bottom: 14px; }
  .cat-btn {
    display: flex; align-items: center;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-secondary); padding: 8px 10px;
    border-radius: var(--radius-sm); cursor: pointer;
    font-size: 11px; font-weight: 600;
    transition: all 0.15s ease; text-align: left;
  }
  .cat-btn:hover {
    background: var(--bg-soft);
    color: var(--text-primary);
  }
  .cat-btn.active {
    color: var(--text-primary);
    background: var(--bg-soft);
    border-color: var(--border-subtle);
  }
  .cat-indicator {
    width: 10px; height: 10px; border-radius: 50%; margin-right: 10px;
    transition: all 0.15s ease;
    flex-shrink: 0;
  }
  .val-filters { display: flex; gap: 4px; margin-bottom: 4px; }
  .val-btn {
    flex: 1; min-width: 55px;
    background: var(--bg-panel);
    border: 1px solid var(--border-medium);
    color: var(--text-secondary); padding: 6px 0;
    border-radius: var(--radius-sm); cursor: pointer;
    font-size: 10px; font-weight: 600; font-variant-numeric: tabular-nums;
    transition: all 0.15s ease; text-align: center;
  }
  .val-btn:hover { border-color: var(--border-strong); color: var(--text-primary); background: var(--bg-soft); }
  .val-btn.active {
    background: var(--accent);
    color: #ffffff;
    border-color: var(--accent);
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(34, 193, 214, 0.35);
  }
  /* ── LIST ── */
  .list-header {
    padding: 14px 20px 10px;
    font-size: 9px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1.2px;
    background: var(--bg-dark);
    border-bottom: 1px solid var(--border-subtle);
    display: flex; align-items: center; gap: 8px;
  }
  .list-header::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--border-subtle), transparent);
  }
  .list-container { flex: 1; padding: 0; background: var(--bg-dark); }
  .list-item {
    padding: 13px 20px; cursor: pointer;
    transition: all 0.15s ease;
    border-left: 3px solid transparent;
    border-bottom: 1px solid var(--border-subtle);
    background: var(--bg-panel);
  }
  .list-item:hover {
    background: var(--bg-soft);
    border-left-color: var(--accent);
    transform: translateX(1px);
  }
  .li-name {
    font-size: 12px; font-weight: 700; color: var(--text-primary);
    margin-bottom: 4px; line-height: 1.3;
  }
  .li-meta {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 10px; color: var(--text-muted); font-weight: 500;
  }
  .li-val { font-weight: 700; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
  /* ── MAP ── */
  .map-container {
    flex: 1; position: relative; height: 100%;
    background: #dde7f0; z-index: 1;
  }
  #map { width: 100%; height: 100%; }
  /* OSM basemap already bright — a hair more saturation for punchier blue water. */
  .leaflet-tile-pane { filter: saturate(1.12) contrast(1.03); }
  /* Zoom controls — clean white cards */
  .leaflet-control-zoom a {
    background: #ffffff !important;
    color: var(--text-primary) !important;
    border-color: var(--border-medium) !important;
    width: 34px !important; height: 34px !important;
    line-height: 34px !important; font-size: 16px !important;
    font-weight: 700 !important;
  }
  .leaflet-control-zoom a:hover {
    background: var(--accent) !important;
    color: #ffffff !important;
    border-color: var(--accent) !important;
  }
  .leaflet-control-zoom {
    border: none !important; border-radius: var(--radius-md) !important;
    overflow: hidden; box-shadow: var(--shadow-md) !important;
  }
  /* Attribution — discreet on bright map */
  .leaflet-control-attribution {
    background: rgba(255,255,255,0.85) !important;
    color: #334155 !important;
    font-size: 10px !important;
    padding: 3px 7px !important;
    border-radius: 4px 0 0 0 !important;
    backdrop-filter: blur(4px);
  }
  .leaflet-control-attribution a { color: #0284c7 !important; }
  /* ── MAP BRANDING — white card, bright ── */
  .map-branding {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%); z-index: 3001;
    background: #ffffff;
    border: 1px solid var(--border-subtle);
    padding: 6px 14px 8px; border-radius: var(--radius-md);
    box-shadow: var(--shadow-lg);
    pointer-events: auto; text-decoration: none;
    display: flex; flex-direction: column; align-items: center;
    transition: all 0.25s ease;
  }
  .map-branding:hover {
    background: #ffffff;
    border-color: var(--accent);
    transform: translateX(-50%) translateY(-1px);
    box-shadow: var(--shadow-xl);
  }
  .map-branding img {
    height: 72px; width: auto; object-fit: contain;
    display: block; opacity: 1;
  }
  .map-branding .brand-tagline {
    font-size: 8px; font-weight: 800; color: var(--accent-dark);
    text-transform: uppercase; letter-spacing: 2px;
    white-space: nowrap; text-align: center; width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 5px;
    margin-top: 2px;
  }
  .map-branding .brand-tagline::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px rgba(34,193,214,0.7);
    animation: live-dot 2.5s ease-in-out infinite;
  }
  @keyframes live-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
  /* ── BACK CTA ── */
  .filters-cta {
    position: absolute; bottom: 28px; right: 28px; z-index: 1000;
    text-decoration: none; display: flex; align-items: center; gap: 6px;
    background: #ffffff;
    border: 1px solid var(--border-medium);
    color: var(--text-primary);
    padding: 10px 16px; border-radius: var(--radius-md);
    font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
    box-shadow: var(--shadow-md);
    transition: all 0.2s ease;
  }
  .filters-cta:hover {
    background: var(--accent);
    color: #ffffff;
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(34, 193, 214, 0.35);
  }
  /* ── MARKERS — white core, dark ring so they pop on bright basemap ── */
  .custom-marker {
    display: flex; justify-content: center; align-items: center;
    width: 100%; height: 100%; background: transparent; cursor: pointer;
  }
  .marker-core {
    width: 13px; height: 13px; border-radius: 50%;
    border: 2.5px solid #ffffff;
    box-shadow:
      0 0 0 1.5px rgba(15, 23, 42, 0.35),
      0 2px 5px rgba(15, 23, 42, 0.35),
      0 4px 10px rgba(15, 23, 42, 0.15);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .custom-marker:hover .marker-core,
  .marker-core.hover-active {
    transform: scale(1.55);
    border-color: #ffffff;
    box-shadow:
      0 0 0 2px rgba(15, 23, 42, 0.45),
      0 0 14px rgba(34, 193, 214, 0.55),
      0 4px 12px rgba(15, 23, 42, 0.35);
  }
  /* ── POPUPS — bright white, clean ── */
  .leaflet-popup-content-wrapper {
    background: #ffffff;
    color: var(--text-primary);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border-subtle);
    box-shadow: var(--shadow-xl);
    padding: 0; overflow: hidden;
  }
  .leaflet-popup-tip {
    background: #ffffff;
    box-shadow: var(--shadow-sm);
  }
  .leaflet-popup-content { margin: 0; width: 300px !important; }
  .leaflet-popup-close-button {
    color: var(--text-muted) !important; font-size: 20px !important;
    padding: 10px 12px !important;
    font-weight: 500 !important;
  }
  .leaflet-popup-close-button:hover { color: var(--text-primary) !important; }
  .pop-header {
    padding: 16px 16px 14px;
    border-bottom: 1px solid var(--border-subtle);
    background: var(--bg-dark);
  }
  .pop-title {
    font-size: 15px; font-weight: 800; color: var(--text-primary);
    line-height: 1.3; margin-bottom: 10px;
    letter-spacing: -0.2px;
  }
  .pop-badge {
    display: inline-flex; align-items: center;
    padding: 3px 9px; border-radius: 4px;
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .pop-body {
    padding: 16px; font-size: 12px;
    background: #ffffff;
    max-height: 400px; overflow-y: auto;
    -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
  }
  .pop-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 8px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .pop-lbl {
    color: var(--text-muted); font-weight: 700; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.5px; width: 30%;
  }
  .pop-val {
    font-weight: 600; text-align: right; width: 70%;
    color: var(--text-primary);
  }
  .pop-val.highlight { color: var(--c-execution); font-weight: 800; }
  .pop-summary {
    margin-top: 12px; color: var(--text-secondary);
    line-height: 1.6; font-size: 12px;
  }
  .pop-summary strong { color: var(--text-primary); }
  .pop-takeaway {
    margin-top: 12px; padding: 10px 12px;
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    color: var(--text-primary); font-weight: 500;
    line-height: 1.5; font-size: 12px;
  }
  .pop-takeaway strong { color: var(--accent-dark); }
  .pop-optional {
    margin-top: 12px; padding-top: 12px;
    border-top: 1px solid var(--border-subtle);
  }
  .pop-opt-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    font-size: 10px; margin-bottom: 5px;
  }
  .pop-opt-lbl {
    color: var(--text-muted); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px; width: 35%;
  }
  .pop-opt-val { color: var(--text-secondary); text-align: right; width: 65%; font-weight: 500; }
  .pop-actions {
    margin-top: 14px; padding-top: 14px;
    border-top: 1px solid var(--border-subtle);
  }
  .pop-btn-secondary {
    display: block; width: 100%;
    background: var(--bg-dark);
    border: 1px solid var(--border-medium);
    color: var(--text-secondary);
    padding: 10px 16px; border-radius: var(--radius-sm);
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
    transition: all 0.15s; text-align: center; cursor: pointer;
  }
  .pop-btn-secondary:hover {
    background: var(--accent);
    color: #ffffff;
    border-color: var(--accent);
  }
  /* ── LIVE INDICATOR ── */
  .live-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 9px; font-weight: 800; color: var(--accent-dark);
    text-transform: uppercase; letter-spacing: 1px;
    padding: 4px 10px;
    background: var(--accent-soft);
    border: 1px solid rgba(34, 193, 214, 0.25);
    border-radius: 20px;
  }
  .live-badge::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px rgba(34,193,214,0.7);
    animation: live-dot 2.5s ease-in-out infinite;
  }
  /* ── MOBILE ── */
  @media(max-width: 800px) {
    .layout { display: block; height: 100dvh; }
    .map-container { height: 100dvh; width: 100vw; position: absolute; top: 0; left: 0; z-index: 1; }
    .leaflet-tile-pane { filter: saturate(1.15) contrast(1.03); }
    .map-branding { top: 12px; padding: 4px 10px 6px; }
    .map-branding img { height: 48px; }
    .map-branding .brand-tagline { font-size: 7px; letter-spacing: 1.5px; }
    .filters-cta {
      bottom: 80px; right: 12px;
      padding: 10px 14px; font-size: 10px;
    }
    .sidebar {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 60px;
      background: #ffffff;
      border-top: 1px solid var(--border-medium);
      border-right: none; border-radius: 18px 18px 0 0;
      box-shadow: 0 -4px 24px rgba(15,23,42,0.12);
      transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden; z-index: 2000;
    }
    .sidebar.expanded { height: 75dvh; }
    .sidebar:not(.expanded) .header,
    .sidebar:not(.expanded) .sidebar-scroll { display: none; }
    .sidebar-scroll { padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 20px); overscroll-behavior: contain; }
    .mobile-handle {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 60px; cursor: pointer;
      flex-shrink: 0; width: 100%;
      background: #ffffff;
    }
    .sidebar.expanded .mobile-handle { border-bottom: 1px solid var(--border-subtle); }
    .handle-bar {
      width: 36px; height: 4px;
      background: rgba(15,23,42,0.18);
      border-radius: 2px; margin-bottom: 6px;
    }
    .handle-lbl {
      font-size: 12px; font-weight: 700; color: var(--text-primary);
      letter-spacing: 0.3px;
    }
    .cat-btn { min-height: 44px; padding: 10px 14px; font-size: 12px; }
    .val-btn { min-height: 44px; padding: 10px 0; font-size: 11px; }
    .search-box { min-height: 44px; font-size: 16px; margin-bottom: 16px; }
    .leaflet-popup-content { width: 320px !important; max-width: 85vw !important; }
    .pop-body { max-height: 40dvh; }
    .pop-title { font-size: 15px; }
    .pop-body { font-size: 13px; }
  }
  @media (max-width: 800px) and (orientation: landscape) {
    .sidebar.expanded { height: 85dvh; }
    .pop-body { max-height: 45dvh; }
  }
  /* ── HOMEPAGE EMBED ── */
  body.is-preview .sidebar,
  body.is-preview .map-branding,
  body.is-preview .filters-cta,
  body.is-preview .leaflet-control-container { display: none !important; }
  body.is-preview .leaflet-tile-pane { filter: saturate(1.2) contrast(1.04) !important; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="mobile-handle" id="mobile-toggle">
      <div class="handle-bar"></div>
      <span class="handle-lbl" id="mobile-toggle-lbl">Tap to view signals</span>
    </div>
    <div class="header">
      <img src="logo-compact.png" alt="The Florida Signal" style="height: 140px; width: auto; object-fit: contain; display: block; margin-bottom: 0;">
      <div class="sub-logo" style="margin-top: 4px;">Development Intelligence Map</div>
      <div class="stats-main">
        <div class="stat-block">
          <div class="stat-val-main"><span id="stat-count">0</span></div>
          <div class="stat-lbl-main">Active Signals</div>
        </div>
        <div class="stat-block">
          <div class="stat-val-main" id="stat-val">$0</div>
          <div class="stat-lbl-main">Tracked Value</div>
        </div>
        <div class="stat-block" style="display:flex; align-items:center; justify-content:center; padding-left:12px;">
          <span class="live-badge">Live</span>
        </div>
      </div>
    </div>
    <div class="sidebar-scroll">
      <div class="filters">
        <input type="text" id="search-box" class="search-box" placeholder="Search projects, developers, or addresses...">
        <span class="filter-lbl">Signal Category</span>
        <div class="cat-filters" id="cat-filters"></div>
        <span class="filter-lbl" style="margin-top:14px;">Minimum Value</span>
        <div class="val-filters">
          <button class="val-btn active" data-val="0">All</button>
          <button class="val-btn" data-val="10000000">$10M+</button>
          <button class="val-btn" data-val="20000000">$20M+</button>
          <button class="val-btn" data-val="30000000">$30M+</button>
        </div>
      </div>
      <div class="list-header">Signals in Motion</div>
      <div class="list-container" id="signal-list"></div>

}
function formatMoney(num) {
  if (num === 0) return '$0';
  if (num >= 1000000000) return '$' + (num / 1000000000).toFixed(1) + 'B';
  if (num >= 1000000) return '$' + (num / 1000000).toFixed(1) + 'M';
  if (num >= 1000) return '$' + (num / 1000).toFixed(0) + 'K';
  return '$' + num;
}
function applyFilters() {
  let activeCount = 0;
  let totalValue = 0;
  const listContainer = document.getElementById('signal-list');
  listContainer.innerHTML = '';
  const searchTerm = document.getElementById('search-box').value.toLowerCase();
  const isFiltered = activeCategories.size !== CATEGORIES.length || minValFilter > 0 || searchTerm.length > 0;
  const filterStatusEl = document.getElementById('filter-status');
  if (isFiltered && filterStatusEl) {
    filterStatusEl.innerText = "Filtered View";
    filterStatusEl.classList.add("active-filter");
  } else if (filterStatusEl) {
    filterStatusEl.innerText = "All Signals";
    filterStatusEl.classList.remove("active-filter");
  }
  Object.values(markers).forEach(item => {
    const s = item.data;
    const mk = item.layer;
    if (s.map_live === false) return;
    const val = getEffectiveValue(s);
    const catMatch = activeCategories.has(s.category);
    const valMatch = val >= minValFilter;
    const searchString = `${s.project_name} ${s.address} ${s.city} ${s.key_players || ''} ${s.owner || ''} ${s.permit_number || ''}`.toLowerCase();
    const searchMatch = searchString.includes(searchTerm);
    if (catMatch && valMatch && searchMatch) {
      if (!map.hasLayer(mk)) mk.addTo(map);
      activeCount++;
      totalValue += val;
      const d = document.createElement('div');
      d.className = 'list-item';
      d.style.borderLeftColor = CAT_COLORS[s.category] || '#94a3b8';
      const isUndisclosed = s.value_label === 'Undisclosed' || s.value_label.includes('Est');
      d.innerHTML = `
        <div class="li-name">${s.project_name}</div>
        <div class="li-meta">
          <span>${s.category}</span>
          <span class="li-val" style="color: ${isUndisclosed ? 'var(--text-muted)' : 'var(--text-primary)'}">${s.value_label}</span>
        </div>
      `;
      if (!isEmbedded) {
        d.onclick = () => {
          window.triggerPinView(s, mk);
          if(window.innerWidth <= 800 && sidebar.classList.contains('expanded')) {
            sidebar.classList.remove('expanded');
            updateMobileHandleLabel();
            map.dragging.enable();
            map.scrollWheelZoom.enable();
            if(map.touchZoom) map.touchZoom.enable();
            if(map.doubleClickZoom) map.doubleClickZoom.enable();
            if(map.boxZoom) map.boxZoom.enable();
            if(map.keyboard) map.keyboard.enable();
            const globalCta = document.getElementById('global-cta');
            if(globalCta) globalCta.style.opacity = '1';
            setTimeout(() => map.invalidateSize(), 320);
          }
        };
      }
      d.onmouseenter = () => { const iconEl = mk.getElement(); if(iconEl) { const core = iconEl.querySelector('.marker-core'); if(core) core.classList.add('hover-active'); } };
      d.onmouseleave = () => { const iconEl = mk.getElement(); if(iconEl) { const core = iconEl.querySelector('.marker-core'); if(core) core.classList.remove('hover-active'); } };
      listContainer.appendChild(d);
    } else {
      if (map.hasLayer(mk)) map.removeLayer(mk);
    }
  });
  if(window.innerWidth <= 800) {
      const globalCta = document.getElementById('global-cta');
      if (globalCta) {
          if(sidebar.classList.contains('expanded')) {
              globalCta.style.opacity = '0';
              globalCta.style.pointerEvents = 'none';
          } else {
              globalCta.style.opacity = '1';
              globalCta.style.pointerEvents = 'auto';
          }
      }
  }
  const statCountEl = document.getElementById('stat-count');
  if (statCountEl) statCountEl.innerText = activeCount;
  const statValEl = document.getElementById('stat-val');
  if (statValEl) statValEl.innerText = formatMoney(totalValue);
  updateMobileHandleLabel();
}
setTimeout(() => { map.invalidateSize(); initMap(); }, 200);
</script>
</body>
</html>
