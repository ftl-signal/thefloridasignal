<!DOCTYPE html>

<head>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0f1a;
    --ink:#e8f0ff;
    --ink-dim:#8ea3c2;
    --ink-muted:#5f748f;
    --cyan:#22d3ee;
    --line:rgba(34,211,238,0.08);
    --line-strong:rgba(34,211,238,0.22);
    --panel:rgba(10,15,26,0.78);
    --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  html,body{height:100%;width:100%;overflow:hidden;background:transparent;color:var(--ink)}

  /* ---------- MAP ---------- */
  #map{
    position:absolute;inset:0;
    width:100vw;height:100vh;
    background:#0a0f1a;
  }
  /* Much lighter grade — tiles stay readable */
  .leaflet-tile-pane{
    filter:
      brightness(1.05)
      contrast(1.08)
      saturate(0.85)
      hue-rotate(-4deg);
  }
  .leaflet-container{background:#0a0f1a}

  /* ---------- ATMOSPHERE (minimal) ---------- */
  .atmos{position:absolute;inset:0;pointer-events:none;z-index:400}
  .atmos .grid{
    position:absolute;inset:0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 72px 72px, 72px 72px;
    mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.55) 40%, transparent 85%);
    -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.55) 40%, transparent 85%);
    opacity:0.35;
  }
  @keyframes scan {
    0% { transform: translateY(-10%); opacity:0 }
    8% { opacity:0.6 }
    92% { opacity:0.6 }
    100% { transform: translateY(110%); opacity:0 }
  }
  .atmos .scan{
    position:absolute;left:0;right:0;height:1px;
    background:linear-gradient(90deg, transparent, rgba(34,211,238,0.4), transparent);
    box-shadow:0 0 18px rgba(34,211,238,0.45);
    animation: scan 12s linear infinite;
  }

  /* ---------- LEGEND ONLY (single HUD element, bottom-left) ---------- */
  .hud-legend{
    position:absolute;z-index:500;pointer-events:none;
    bottom:16px;left:16px;
    padding:10px 12px;
    background:var(--panel);
    border:1px solid var(--line-strong);
    border-radius:10px;
    backdrop-filter: blur(10px) saturate(140%);
    -webkit-backdrop-filter: blur(10px) saturate(140%);
    box-shadow:0 10px 30px rgba(0,0,0,0.45);
  }
  .lg-title{
    font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--ink-muted);
    text-transform:uppercase;margin-bottom:7px;font-weight:700;
    display:flex;align-items:center;gap:6px;
  }
  .lg-title::before{content:"";width:14px;height:1px;background:var(--line-strong)}
  .lg-row{display:flex;align-items:center;gap:7px;font-size:10.5px;color:var(--ink-dim);padding:2px 0;font-weight:500}
  .lg-swatch{
    width:8px;height:8px;border-radius:50%;flex-shrink:0;
    box-shadow:0 0 8px currentColor;
  }

  /* Hide legend on small embeds so it doesn't crowd the map */
  @media (max-width: 520px){ .hud-legend{display:none} }

  /* ---------- MARKERS (high-contrast beacons) ---------- */
  .custom-marker{
    display:flex;justify-content:center;align-items:center;
    width:100%;height:100%;background:transparent;cursor:pointer;
    position:relative;
  }
  /* Ambient radial halo */
  .marker-halo{
    position:absolute;z-index:1;
    width:38px;height:38px;border-radius:50%;
    background:radial-gradient(circle, color-mix(in srgb, var(--c) 65%, transparent) 0%, transparent 70%);
    opacity:0.6;
    filter:blur(2px);
    transition:opacity 0.25s, transform 0.25s;
  }
  /* Target ring */
  .marker-ring-static{
    position:absolute;z-index:2;
    width:20px;height:20px;border-radius:50%;
    border:1px solid color-mix(in srgb, var(--c) 75%, transparent);
    background:color-mix(in srgb, var(--c) 10%, transparent);
    box-shadow:
      inset 0 0 6px color-mix(in srgb, var(--c) 45%, transparent),
      0 0 12px color-mix(in srgb, var(--c) 50%, transparent);
  }
  /* Bright core */
  .marker-core{
    position:relative;z-index:4;
    width:13px;height:13px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ffffff 0%, var(--c) 45%, color-mix(in srgb, var(--c) 60%, #000) 100%);
    box-shadow:
      0 0 0 2px rgba(255,255,255,0.95),
      0 0 14px 2px var(--c),
      0 0 30px 4px color-mix(in srgb, var(--c) 65%, transparent),
      0 2px 10px rgba(0,0,0,0.8);
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1), box-shadow 0.25s;
  }
  /* Bullseye dot */
  .marker-core::after{
    content:"";position:absolute;inset:0;margin:auto;
    width:3px;height:3px;border-radius:50%;
    background:#ffffff;opacity:0.95;
    box-shadow:0 0 5px #fff;
  }
  /* Pulse rings on high-strength signals */
  .marker-ring{
    position:absolute;z-index:2;
    width:18px;height:18px;border-radius:50%;
    border:1.5px solid var(--c);
    opacity:0.9;
    animation: pulseRing 2.8s ease-out infinite;
    pointer-events:none;
  }
  .marker-ring.r2{ animation-delay: 1.4s; }
  @keyframes pulseRing{
    0%   { transform:scale(1);   opacity:0.8 }
    80%  { transform:scale(3.0); opacity:0 }
    100% { transform:scale(3.0); opacity:0 }
  }
  .custom-marker:not(.priority) .marker-ring{display:none}

  .custom-marker:hover{z-index:9999}
  .custom-marker:hover .marker-halo{opacity:1;transform:scale(1.3)}
  .custom-marker:hover .marker-core{
    transform:scale(1.75);
    box-shadow:
      0 0 0 2px #fff,
      0 0 22px 4px var(--c),
      0 0 48px 10px color-mix(in srgb, var(--c) 80%, transparent),
      0 4px 18px rgba(0,0,0,0.8);
  }
  .custom-marker:hover .marker-ring-static{
    border-color:var(--c);
    background:color-mix(in srgb, var(--c) 22%, transparent);
    box-shadow:
      inset 0 0 12px color-mix(in srgb, var(--c) 65%, transparent),
      0 0 22px color-mix(in srgb, var(--c) 80%, transparent);
  }

  /* ---------- POPUP (glassmorphism) ---------- */
  .leaflet-popup-content-wrapper{
    background:linear-gradient(180deg, rgba(17,24,39,0.94) 0%, rgba(10,15,26,0.94) 100%);
    color:var(--ink);
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:
      0 24px 70px rgba(0,0,0,0.8),
      0 0 0 1px rgba(34,211,238,0.06),
      inset 0 1px 0 rgba(255,255,255,0.05);
    padding:0;overflow:hidden;
    backdrop-filter: blur(20px) saturate(170%);
    -webkit-backdrop-filter: blur(20px) saturate(170%);
  }
  .leaflet-popup-tip{
    background:rgba(10,15,26,0.94);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 8px 22px rgba(0,0,0,0.55);
  }
  .leaflet-popup-content{margin:0;width:320px !important}
  .leaflet-popup-close-button{
    color:var(--ink-dim) !important; font-size:22px !important;
    padding:10px !important; top:4px !important; right:4px !important;
    transition:color 0.2s;
  }
  .leaflet-popup-close-button:hover{color:#fff !important}

  .pop-header{
    position:relative;padding:18px 18px 14px;
    border-bottom:1px solid rgba(255,255,255,0.06);
    background:linear-gradient(180deg, color-mix(in srgb, var(--c) 14%, transparent) 0%, transparent 100%);
  }
  .pop-header::before{
    content:"";position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg, var(--c), color-mix(in srgb, var(--c) 20%, transparent));
    box-shadow:0 0 16px var(--c);
  }
  .pop-meta{
    display:flex;align-items:center;gap:8px;margin-bottom:8px;
    font-family:var(--mono);font-size:9px;letter-spacing:1.5px;
    color:var(--ink-muted);text-transform:uppercase;font-weight:600;
  }
  .pop-meta .dot{width:6px;height:6px;border-radius:50%;background:var(--c);box-shadow:0 0 8px var(--c)}
  .pop-title{
    font-size:16px;font-weight:800;color:#fff;line-height:1.25;
    margin-bottom:12px;letter-spacing:-0.2px;
  }
  .pop-chips{display:flex;gap:6px;flex-wrap:wrap}
  .pop-badge{
    display:inline-flex;align-items:center;gap:5px;
    padding:4px 8px;border-radius:6px;
    font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;
    background:color-mix(in srgb, var(--c) 18%, transparent);
    color:var(--c);
    border:1px solid color-mix(in srgb, var(--c) 38%, transparent);
  }
  .pop-badge.ghost{
    background:rgba(255,255,255,0.04);color:var(--ink-dim);border-color:rgba(255,255,255,0.08);
  }

  .pop-body{padding:14px 18px 18px;max-height:380px;overflow-y:auto}
  .pop-body::-webkit-scrollbar{width:6px}
  .pop-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
  .pop-row{
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);gap:12px;
  }
  .pop-row:last-of-type{border-bottom:none}
  .pop-lbl{
    color:var(--ink-muted);font-weight:600;font-size:9px;
    text-transform:uppercase;letter-spacing:1.4px;
    min-width:72px;flex-shrink:0;padding-top:2px;
  }
  .pop-val{
    font-weight:600;text-align:right;font-size:12px;color:var(--ink);
    flex:1;word-break:break-word;
  }
  .pop-val.mono{font-family:var(--mono);font-size:11px;color:var(--ink-dim);font-weight:500}
  .pop-val.highlight{
    color:#fff;font-weight:800;font-size:14px;
    background:linear-gradient(90deg, var(--c), #fff);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  .pop-summary{
    margin-top:12px;padding:12px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.05);
    border-left:2px solid var(--c);
    border-radius:6px;
    color:var(--ink-dim);line-height:1.55;font-size:12px;
  }
  .pop-summary strong{color:var(--ink);font-weight:700}

  .leaflet-popup{animation: popIn 0.28s cubic-bezier(0.34,1.56,0.64,1) both}
  @keyframes popIn{
    from{opacity:0;transform:translateY(6px) scale(0.96)}
    to{opacity:1;transform:translateY(0) scale(1)}
  }
  @media (max-width: 780px){ .leaflet-popup-content{width:260px !important} }
</style>
</head>

const coordMap = new Set();
signals.forEach(s => {
  let coordKey = `${s.latitude},${s.longitude}`;
  while (coordMap.has(coordKey)) {
    s.latitude += (Math.random() - 0.5) * 0.001;
    s.longitude += (Math.random() - 0.5) * 0.001;
    coordKey = `${s.latitude},${s.longitude}`;
  }
  coordMap.add(coordKey);
});

signals.forEach(s => {
  const color = CAT_COLORS[s.category] || "#94a3b8";
  const priorityClass = (s.signal_strength === 'High') ? ' priority' : '';
  const icon = L.divIcon({
    className: 'custom-marker' + priorityClass,
    html: `
      <div class="marker-halo" style="--c:${color}"></div>
      <div class="marker-ring-static" style="--c:${color}"></div>
      <div class="marker-ring" style="--c:${color}"></div>
      <div class="marker-ring r2" style="--c:${color}"></div>
      <div class="marker-core" style="--c:${color}"></div>
    `,
    iconSize: [48, 48],
    iconAnchor: [24, 24]
  });
  const mk = L.marker([s.latitude, s.longitude], { icon: icon }).addTo(map);

  let bodyHtml = '';
  if(s.address || s.city) bodyHtml += `<div class="pop-row"><span class="pop-lbl">Address</span><span class="pop-val">${[s.address, s.city].filter(Boolean).join(', ')}</span></div>`;
  if(s.owner) bodyHtml += `<div class="pop-row"><span class="pop-lbl">Owner</span><span class="pop-val">${s.owner}</span></div>`;
  if(s.signal_type) bodyHtml += `<div class="pop-row"><span class="pop-lbl">Type</span><span class="pop-val">${s.signal_type}</span></div>`;
  if(s.permit_number) bodyHtml += `<div class="pop-row"><span class="pop-lbl">Permit #</span><span class="pop-val mono">${s.permit_number}</span></div>`;
  if(s.value_label) bodyHtml += `<div class="pop-row"><span class="pop-lbl">Value</span><span class="pop-val highlight" style="--c:${color}">${s.value_label}</span></div>`;
  if(s.summary) bodyHtml += `<div class="pop-summary" style="--c:${color}"><strong>Signal:</strong> ${s.summary}</div>`;

  const strengthChip = s.signal_strength ? `<div class="pop-badge ghost">${s.signal_strength} Strength</div>` : '';
  const statusChip = s.status_label ? `<div class="pop-badge ghost">${s.status_label}</div>` : '';

  mk.bindPopup(`
    <div class="pop-header" style="--c:${color}">
      <div class="pop-meta"><span class="dot"></span> ${s.id} &bull; Signal Report</div>
      <div class="pop-title">${s.project_name}</div>
      <div class="pop-chips">
        <div class="pop-badge" style="--c:${color}">${s.category}</div>
        ${strengthChip}
        ${statusChip}
      </div>
    </div>
    <div class="pop-body">${bodyHtml}</div>
  `, { autoPan: false, maxWidth: 340, className: 'fs-popup' });
});

setTimeout(() => map.invalidateSize(), 200);
