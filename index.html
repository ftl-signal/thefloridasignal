  body, html { height: 100%; width: 100%; overflow: hidden; background-color: var(--bg-dark); color: var(--text-main); }

  .layout { display: flex; height: 100vh; width: 100vw; position: relative; }
  .mobile-handle { display: none; }

  .sidebar { width: 400px; background: var(--bg-dark); border-right: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; z-index: 1000; box-shadow: 4px 0 15px rgba(0,0,0,0.5); }
  .header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; }
  .logo { font-size: 16px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; color: #fff; }

  .stat-val { font-size: 18px; font-weight: 700; color: #fff; }
  .stat-lbl { font-size: 9px; text-transform: uppercase; font-weight: 600; color: var(--text-muted); margin-top: 4px; line-height: 1.3; opacity: 0.8; }

  .sidebar-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; -webkit-overflow-scrolling: touch; }
  .filters { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); background: transparent; flex-shrink: 0; }
  
  .search-box { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 10px 12px; border-radius: 6px; font-size: 12px; outline: none; margin-bottom: 16px; transition: border-color 0.2s; }
  .search-box:focus { border-color: var(--brand-blue); }

  .filter-lbl { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; display: block; }
  .cat-filters { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .cat-btn { display: flex; align-items: center; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s; text-align: left; }
  .cat-btn:hover { background: rgba(255,255,255,0.05); }
  .cat-btn.active { color: #fff; border-color: currentColor; background: rgba(255,255,255,0.05); }
  .cat-indicator { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; }

  .val-filters { display: flex; flex-wrap: wrap; gap: 6px; }
  .val-btn { flex: 1; min-width: 60px; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); padding: 6px 0; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; transition: 0.2s; text-align: center; }
  .val-btn.active { background: var(--brand-blue); color: #0f172a; border-color: var(--brand-blue); }

  .list-container { flex: 1; padding: 0; }

  .list-item:hover { background: rgba(255,255,255,0.03); }
  .li-name { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 4px; }

  /* Map Container */
  .map-container { flex: 1; position: relative; height: 100%; background: #0b0f19; z-index: 1; }
  #map { width: 100%; height: 100%; }
  .leaflet-tile-pane { filter: brightness(1.8) contrast(1.1) saturate(1.2); } 

  /* VIBRANT BRANDING BUG */
  .map-branding {
    position: absolute; top: 24px; left: 60px; z-index: 3001;
    background: rgba(11, 15, 25, 0.96);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(56, 189, 248, 0.4); 
    padding: 14px 20px; border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.6), inset 0 1px 1px rgba(56, 189, 248, 0.2); 
    pointer-events: none; 
    display: flex; flex-direction: column; align-items: center; 
    justify-content: center;
  }
  .map-branding img { height: 44px; width: auto; margin-bottom: 6px; } 
  .map-branding .brand-tagline { 
    font-size: 13px; 
    font-weight: 800; 
    color: var(--brand-blue); 
    text-transform: uppercase; 
    letter-spacing: 1.5px; 
    text-shadow: var(--urgent-glow);
    animation: live-pulse 2s infinite ease-in-out;
    text-align: center;
    width: 100%;
  }

  @keyframes live-pulse {
    0%, 100% { opacity: 1; text-shadow: var(--urgent-glow); }
    50% { opacity: 0.8; text-shadow: 0 0 3px rgba(56, 189, 248, 0.3); }
  }

  /* Interaction Cue */
  .map-cue {
    position: absolute; top: 24px; left: 50%; transform: translateX(-50%);

  }
  .map-cue.fade-out { opacity: 0; }

  /* MODERN GLOBAL CTA */
  .filters-cta {
    position: absolute; bottom: 32px; right: 32px; z-index: 1000;
    text-decoration: none; display: flex; align-items: center; gap: 8px;
    background: rgba(11, 15, 25, 0.96);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);

    text-transform: uppercase;

  }
  .filters-cta:hover { 
    background: var(--brand-blue); 
    color: #000000; 
    transform: translateY(-3px); 
    box-shadow: 0 12px 30px rgba(0,0,0,0.8), 0 0 20px rgba(56, 189, 248, 0.5);

  .pop-title { font-size: 15px; font-weight: 800; color: #fff; line-height: 1.3; margin-bottom: 10px; }
  .pop-badge { display: inline-block; padding: 3px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; text-transform: uppercase; color: #000; letter-spacing: 0.5px;}

  .pop-optional { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); }
  .pop-opt-row { display: flex; justify-content: space-between; align-items: flex-start; font-size: 10px; margin-bottom: 4px; }
  .pop-opt-lbl { color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; width: 35%; }

const CAT_COLORS = {
  "Land in Play": "#A855F7",
  "In Approvals": "#F59E0B",
  "Pre-Construction": "#3B82F6",
  "Under Construction": "#10B981",
  "Capital Repositioning": "#F43F5E"
};

const CATEGORIES = Object.keys(CAT_COLORS);
let activeCategories = new Set(CATEGORIES);
let minValFilter = 0; 
let markers = {}; 

const coordMap = new Set();
signals.forEach(s => {
  let coordKey = `${s.latitude},${s.longitude}`;
  while (coordMap.has(coordKey)) {
    s.latitude += (Math.random() - 0.5) * 0.001;
    s.longitude += (Math.random() - 0.5) * 0.001;
    coordKey = `${s.latitude},${s.longitude}`;
  }
  coordMap.add(coordKey);
});

const mapOptions = {
  zoomControl: false, 
  attributionControl: false,
  dragging: !isEmbedded,
  scrollWheelZoom: !isEmbedded,
  doubleClickZoom: !isEmbedded,
  boxZoom: !isEmbedded,
  touchZoom: !isEmbedded,
  keyboard: !isEmbedded
};

const map = L.map('map', mapOptions).setView([26.15, -80.14], 11);
if (!isEmbedded) {
  L.control.zoom({ position: 'topright' }).addTo(map);
}

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19
}).addTo(map);

const sidebar = document.getElementById('sidebar');
const mobileToggle = document.getElementById('mobile-toggle');
const mobileToggleLbl = document.getElementById('mobile-toggle-lbl');

mobileToggle.addEventListener('click', () => {
  sidebar.classList.toggle('expanded');
  const isExpanded = sidebar.classList.contains('expanded');
  
  if(isExpanded) {
    mobileToggleLbl.innerText = "Tap to close panel";
    map.dragging.disable();
    map.scrollWheelZoom.disable();
    if(map.touchZoom) map.touchZoom.disable();
    if(map.doubleClickZoom) map.doubleClickZoom.disable();
    if(map.boxZoom) map.boxZoom.disable();
    if(map.keyboard) map.keyboard.disable();
  } else {
    updateMobileHandleLabel();
    if(!isEmbedded) {
      map.dragging.enable();
      map.scrollWheelZoom.enable();
      if(map.touchZoom) map.touchZoom.enable();
      if(map.doubleClickZoom) map.doubleClickZoom.enable();
      if(map.boxZoom) map.boxZoom.enable();
      if(map.keyboard) map.keyboard.enable();
    }
  }
  setTimeout(() => map.invalidateSize(), 320);
});

function updateMobileHandleLabel() {
  if(!sidebar.classList.contains('expanded')) {
    const visibleCount = document.getElementById('stat-count').innerText;
    mobileToggleLbl.innerText = `Tap to view ${visibleCount} signals`;
  }
}

document.getElementById('search-box').addEventListener('input', applyFilters);

function getEffectiveValue(signal) {
  if (signal.declared_value !== null && signal.declared_value !== undefined) return signal.declared_value;
  if (signal.estimated_value !== null && signal.estimated_value !== undefined) return signal.estimated_value;
  return null;
}

function initMap() {
  document.getElementById('stat-total').innerText = signals.length;
  
  const cue = document.getElementById('map-cue');
  if (cue) cue.innerText = `Tap to explore ${signals.length} active signals`;

  const hideCue = () => { if (cue) cue.classList.add('fade-out'); };
  
  if (!isEmbedded) {
    map.once('dragstart', hideCue);
    map.once('click', hideCue);
    map.once('zoomstart', hideCue);
  }

  buildCategoryFilters();
  setupValueFilters();
  
  signals.forEach(s => {
    if (s.map_live === false) return;

    const color = CAT_COLORS[s.category] || "#94a3b8";
    const icon = L.divIcon({
      className: 'custom-marker',
      html: `<div class="marker-core" style="background-color: ${color}; border-color: ${color};"></div>`,
      iconSize: [44, 44], 
      iconAnchor: [22, 22]
    });

    const mk = L.marker([s.latitude, s.longitude], { icon: icon }).addTo(map);
    
    if (!isEmbedded) {
      // 1. Pop-body rows (Strict Order & Conditionals)
      let bodyHtml = `<div class="pop-row"><span class="pop-lbl">Address</span><span class="pop-val">${s.address}, ${s.city}</span></div>`;
      if (s.permit_number) bodyHtml += `<div class="pop-row"><span class="pop-lbl">Permit #</span><span class="pop-val" style="font-family:var(--mono); font-size:10px">${s.permit_number}</span></div>`;
      if (s.filed_date) bodyHtml += `<div class="pop-row"><span class="pop-lbl">Filed</span><span class="pop-val">${s.filed_date}</span></div>`;
      
      bodyHtml += `<div class="pop-row"><span class="pop-lbl">Value</span><span class="pop-val highlight">${s.value_label}</span></div>`;
      
      if (s.owner || s.applicant) {
          let entity = s.owner || s.applicant;
          if (s.owner && s.applicant) entity = `${s.owner} / ${s.applicant}`;
          bodyHtml += `<div class="pop-row"><span class="pop-lbl">Entity</span><span class="pop-val">${entity}</span></div>`;
      }

      // 2. Editorial Text
      if (s.summary) bodyHtml += `<div class="pop-summary" style="margin-top:16px;"><strong>What we found:</strong> ${s.summary}</div>`;
      if (s.why_it_matters) bodyHtml += `<div class="pop-takeaway" style="margin-top:12px;"><strong>Why it matters:</strong> ${s.why_it_matters}</div>`;
      if (s.what_next) bodyHtml += `<div class="pop-summary" style="margin-top:12px;"><strong>What's next:</strong> ${s.what_next}</div>`;
      if (s.what_we_dont_know) bodyHtml += `<div class="pop-summary" style="margin-top:12px; color:var(--c-cap)"><strong>Caution:</strong> ${s.what_we_dont_know}</div>`;

      // 3. Optionals
      let optionalFields = '';
      let hasOptionals = s.key_players || s.scale || s.timeline || s.contractor || s.parcel_id;
      if (hasOptionals) {
        optionalFields = `<div class="pop-optional">`;
        if (s.key_players) optionalFields += `<div class="pop-opt-row"><span class="pop-opt-lbl">Players</span><span class="pop-opt-val">${s.key_players}</span></div>`;
        if (s.contractor) optionalFields += `<div class="pop-opt-row"><span class="pop-opt-lbl">Contractor</span><span class="pop-opt-val">${s.contractor}</span></div>`;
        if (s.scale) optionalFields += `<div class="pop-opt-row"><span class="pop-opt-lbl">Scale</span><span class="pop-opt-val">${s.scale}</span></div>`;
        if (s.timeline) optionalFields += `<div class="pop-opt-row"><span class="pop-opt-lbl">Timeline</span><span class="pop-opt-val">${s.timeline}</span></div>`;
        if (s.parcel_id) optionalFields += `<div class="pop-opt-row"><span class="pop-opt-lbl">Parcel ID</span><span class="pop-opt-val" style="font-family:var(--mono); font-size:9px">${s.parcel_id}</span></div>`;
        optionalFields += `</div>`;
      }

      // 4. Action Links
      let actionLinks = '';
      if (s.source_links) {
          let linksHtml = '';
          if (s.source_links.web_story) {
              linksHtml += `<a href="${s.source_links.web_story}" target="_blank" class="pop-btn-primary">Read full brief &rarr;</a>`;
          }
          let secondaryLinks = [];
          if (s.source_links.permit) secondaryLinks.push(`<a href="${s.source_links.permit}" target="_blank">Permit</a>`);
          if (s.source_links.appraiser) secondaryLinks.push(`<a href="${s.source_links.appraiser}" target="_blank">Appraiser</a>`);
          if (s.source_links.gis) secondaryLinks.push(`<a href="${s.source_links.gis}" target="_blank">GIS</a>`);
          if (s.source_links.agenda) secondaryLinks.push(`<a href="${s.source_links.agenda}" target="_blank">Agenda</a>`);
          
          if (secondaryLinks.length > 0) linksHtml += `<div class="pop-sources"><strong>Sources:</strong> ${secondaryLinks.join(' | ')}</div>`;
          if (linksHtml) actionLinks = `<div class="pop-actions">${linksHtml}</div>`;
      }

      mk.bindPopup(`
        <div class="pop-header" style="border-top: 4px solid ${color}">
          <div class="pop-title">${s.project_name}</div>
          <div style="display:flex; gap:6px; flex-wrap:wrap;">
            <div class="pop-badge" style="background-color: ${color}33; color: ${color}; border: 1px solid ${color}66;">${s.category}</div>
            <div class="pop-badge" style="background-color: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.2);">STATUS: ${s.status_label.toUpperCase()}</div>
            <div class="pop-badge" style="background-color: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1);">SIG: ${s.signal_strength.toUpperCase()}</div>
          </div>
        </div>
        <div class="pop-body">
          ${bodyHtml}
          ${optionalFields}
          ${actionLinks}
        </div>
      `, { autoPanPaddingTopLeft: L.point(0, 50) });

      mk.on('click', () => {
        map.flyTo([s.latitude + 0.006, s.longitude], 15, { duration: 0.8 });
        hideCue();
      });
    }
    
    markers[s.id] = { data: s, layer: mk };
  });

  applyFilters();
}

function buildCategoryFilters() {
  const container = document.getElementById('cat-filters');
  CATEGORIES.forEach(cat => {
    const color = CAT_COLORS[cat];
    const btn = document.createElement('button');
    btn.className = 'cat-btn active';
    btn.innerHTML = `<div class="cat-indicator" style="background-color: ${color}; box-shadow: 0 0 4px ${color};"></div> ${cat}`;
    btn.onclick = () => {
      if (activeCategories.has(cat)) {
        activeCategories.delete(cat);
        btn.classList.remove('active');
        btn.querySelector('.cat-indicator').style.opacity = '0.2';
      } else {
        activeCategories.add(cat);
        btn.classList.add('active');
        btn.querySelector('.cat-indicator').style.opacity = '1';
      }
      applyFilters();
    };
    container.appendChild(btn);
  });
}

function setupValueFilters() {
  const btns = document.querySelectorAll('.val-btn');
  btns.forEach(btn => {
    btn.onclick = () => {
      btns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      minValFilter = parseInt(btn.getAttribute('data-val'));
      applyFilters();
    };
  });
}

function formatMoney(num) {
  if (num === 0) return '$0';
  if (num >= 1000000000) return '$' + (num / 1000000000).toFixed(1) + 'B';
  if (num >= 1000000) return '$' + (num / 1000000).toFixed(1) + 'M';
  if (num >= 1000) return '$' + (num / 1000).toFixed(0) + 'K';
  return '$' + num;
}

function applyFilters() {
  let activeCount = 0;
  let totalValue = 0;
  const listContainer = document.getElementById('signal-list');
  listContainer.innerHTML = '';
  
  const searchTerm = document.getElementById('search-box').value.toLowerCase();
  
  const isFiltered = activeCategories.size !== CATEGORIES.length || minValFilter > 0 || searchTerm.length > 0;
  const filterStatusEl = document.getElementById('filter-status');
  if (isFiltered) {
    filterStatusEl.innerText = "Filtered View";
    filterStatusEl.classList.add("active-filter");
  } else {
    filterStatusEl.innerText = "All Signals";
    filterStatusEl.classList.remove("active-filter");
  }

  Object.values(markers).forEach(item => {
    const s = item.data;
    const mk = item.layer;
    
    if (s.map_live === false) return; 

    const val = getEffectiveValue(s) || 0;
    const catMatch = activeCategories.has(s.category);
    const valMatch = val >= minValFilter;
    
    const searchString = `${s.project_name} ${s.address} ${s.city} ${s.key_players || ''} ${s.owner || ''} ${s.permit_number || ''}`.toLowerCase();
    const searchMatch = searchString.includes(searchTerm);

    if (catMatch && valMatch && searchMatch) {
      if (!map.hasLayer(mk)) mk.addTo(map);
      activeCount++;
      totalValue += val;

      const d = document.createElement('div');
      d.className = 'list-item';
      d.style.borderLeftColor = CAT_COLORS[s.category] || '#94a3b8';
      const isUndisclosed = s.value_label === 'Undisclosed' || s.value_label.includes('Est');
      
      d.innerHTML = `
        <div class="li-name">${s.project_name}</div>
        <div class="li-meta">
          <span>${s.category} | ${s.status_label.toUpperCase()}</span>
          <span class="li-val" style="color: ${isUndisclosed ? 'var(--text-muted)' : '#cbd5e1'}">${s.value_label}</span>
        </div>
      `;
      
      if (!isEmbedded) {
        d.onclick = () => {
          map.flyTo([s.latitude + 0.006, s.longitude], 15, { duration: 0.8 });
          mk.openPopup();
          
          if(window.innerWidth <= 800 && sidebar.classList.contains('expanded')) {
            sidebar.classList.remove('expanded');
            updateMobileHandleLabel();
            map.dragging.enable();
            map.scrollWheelZoom.enable();
            if(map.touchZoom) map.touchZoom.enable();
            if(map.doubleClickZoom) map.doubleClickZoom.enable();
            if(map.boxZoom) map.boxZoom.enable();
            if(map.keyboard) map.keyboard.enable();
            
            const globalCta = document.getElementById('global-cta');
            if(globalCta) globalCta.style.opacity = '1';
            
            setTimeout(() => map.invalidateSize(), 320);
          }
        };
      }
      
      d.onmouseenter = () => { const iconEl = mk.getElement(); if(iconEl) { const core = iconEl.querySelector('.marker-core'); if(core) core.classList.add('hover-active'); } };
      d.onmouseleave = () => { const iconEl = mk.getElement(); if(iconEl) { const core = iconEl.querySelector('.marker-core'); if(core) core.classList.remove('hover-active'); } };
      
      listContainer.appendChild(d);
    } else {
      if (map.hasLayer(mk)) map.removeLayer(mk);
    }
  });

  if(window.innerWidth <= 800) {
      const globalCta = document.getElementById('global-cta');
      if (globalCta) {
          if(sidebar.classList.contains('expanded')) {
              globalCta.style.opacity = '0';
              globalCta.style.pointerEvents = 'none';
          } else {
              globalCta.style.opacity = '1';
              globalCta.style.pointerEvents = 'auto';
          }
      }
  }

  document.getElementById('stat-count').innerText = activeCount;
  document.getElementById('stat-val').innerText = formatMoney(totalValue);
  updateMobileHandleLabel();
}

setTimeout(() => { map.invalidateSize(); initMap(); }, 200);
</script>
</body>
</html>
